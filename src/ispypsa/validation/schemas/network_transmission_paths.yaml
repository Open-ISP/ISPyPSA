table: network_transmission_paths
required: false
unique:
  - [path_id]
description: >
  Transmission paths connecting geographies in the network model.

  Includes inter-subregional flow paths, regional interconnectors, and
  REZ-to-subregion connections.

  Source tables:
    - `flow_path_transfer_capability`
    - `renewable_energy_zones`
    - `flow_path_augmentation_options_<flow_path>`

  Source notes:
  Augmentation options for corridors with no existing path (new parallel
  corridors) are appended as zero-capacity paths by the `templater`.

  If absent:
  The model is constructed with no transmission paths. Geographies with no
  connecting paths are electrically isolated.
columns:
  path_id:
    type: string
    required: true
    description: >
      Unique identifier for the path. Base format is geo_from-geo_to (e.g.
      CQ-NQ). Parallel paths append a suffix after an underscore (e.g.
      NNSW-SQ_Terranora, CNSW-SNW_NTH). The geo codes used vary with
      regional_granularity: ISP sub-region codes for "sub_regions", NEM region
      codes for "nem_regions", and "NEM" for "single_region" (REZ paths only).
  geo_from:
    type: string
    required: true
    allowed_values_from:
      - network_geography: geo_id
    description: Origin geography. Defines the forward flow direction.
  geo_to:
    type: string
    required: true
    allowed_values_from:
      - network_geography: geo_id
    description: Destination geography. Defines the forward flow direction.
  carrier:
    type: string
    required: true
    allowed_values: [AC, DC]
    description: Transmission technology.
