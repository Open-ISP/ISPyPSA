table: network_geography
required: true
unique:
  - [geo_id]
description: >
  Unified table of all spatial entities in the network model.

  Contains NEM subregions, NEM regions, and renewable energy zones (REZs).
  Subregion and region entries are for spatial rollups and results formatting
  only.

  Source tables:
    - `sub_regional_reference_nodes`
    - `renewable_energy_zones`
columns:
  geo_id:
    type: string
    required: true
    description: Unique identifier for the geography.
  geo_type:
    type: string
    required: true
    allowed_values: [subregion, region, rez]
    description: Type of spatial entity.
  region_id:
    type: string
    required: true
    allowed_values: [QLD, NSW, VIC, SA, TAS, NEM]
    description: >
      NEM region the geography belongs to. The "NEM" value is used only when
      regional_granularity is "single_region", where the whole network is
      represented as a single geography.
  subregion_id:
    type: string
    required: false
    description: >
      ISP sub-region the geography belongs to. For subregion entries, equals
      geo_id.

      If absent:
      The template was built with regional_granularity "nem_regions" or
      "single_region"; the column is only present for "sub_regions".
