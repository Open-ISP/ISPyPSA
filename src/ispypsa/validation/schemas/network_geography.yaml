table: network_geography
required: true
unique:
  - [geo_id]
description: >
  Unified table of all spatial entities in the network model:
  NEM subregions, NEM regions, and renewable energy zones (REZs).
  All table mappings use geo_id as the primary key.
  Subregion and region entries are for spatial rollups and results formatting
  only.
  Required — the model cannot run without geographies defined.
columns:
  geo_id:
    type: string
    required: true
    description: Unique identifier for the geography.
  geo_type:
    type: string
    required: true
    allowed_values: [subregion, region, rez]
    description: Type of spatial entity.
  region_id:
    type: string
    required: true
    allowed_values: [QLD, NSW, VIC, SA, TAS]
    description: NEM region the geography belongs to.
  subregion_id:
    type: string
    required: true
    description: >
      ISP sub-region the geography belongs to.
      For subregion entries, equals geo_id.
