table: network_transmission_path_limits
required: false
unique:
  - [path_id, direction, timeslice]
description: >
  Transmission capacity limits, looked up per path, flow direction and demand
  condition (timeslice).

  The three key columns — path_id, direction and timeslice — identify the
  combination a limit applies to. Any key may be left empty to act as a wildcard
  matching every value of that dimension: an empty timeslice is a fallback across
  demand conditions, an empty direction applies to both directions, and an empty
  path_id is a table-wide default. Where several rows match a combination the most
  specific (fewest empty keys) wins; the custom_validation rules require that
  resolution to be both unambiguous and complete.

  Source tables:
    - `flow_path_transfer_capability`
    - `initial_transmission_limits`

  If absent:
  There are no transmission paths to limit; a populated paths table requires
  matching limits (see custom_validation).
custom_validation:
  - name: limits_resolve_unambiguously
    description: >
      No combination may be matched by two rows tied for the fewest wildcards —
      resolution must have a single most-specific winner. (The combination and
      wildcard model is described in the table description; this generalises
      timeslices.no_overlapping_windows to all three keys.)
  - name: limits_cover_every_path_direction_and_timeslice
    description: >
      A path that names timeslices must name them all for its region, or add an empty-timeslice
      fallback, in both directions; a single all-empty row covers the whole space.
      Because the timeslices table's windows partition the year, covering every
      region timeslice_id covers every snapshot downstream.
columns:
  path_id:
    type: string
    required: false
    allowed_values_from:
      - network_transmission_paths: path_id
    description: >
      Transmission path the limit applies to.

      If absent (or empty):
      Wildcard — applies to every path no more specific row covers (a table-wide
      default).
  direction:
    type: string
    required: false
    allowed_values: [forward, reverse]
    description: >
      Power flow direction relative to geo_from and geo_to.

      If absent (or empty):
      Wildcard — applies to both directions for any combination no more specific
      row covers.
  timeslice:
    type: string
    required: false
    allowed_values_from:
      - timeslices: timeslice_id
    description: >
      Demand condition the limit applies to: the limit binds only at snapshots
      inside the timeslice's active windows. A timeslice_id's region is the prefix
      before its first underscore (e.g. qld in qld_peak_demand).

      If absent (or empty):
      Wildcard — a fallback across demand conditions, applying at every timeslice
      no more specific row covers for the same path and direction.
  capacity:
    type: float
    required: false
    units: MW
    gte: 0.0
    nan_fill: {config: network.transmission_default_limit}
    description: >
      Transfer capability limit for the resolved combination.

      If absent (or empty):
      The combination takes the configured transmission default
      (network.transmission_default_limit). A value sentinel, distinct from 0,
      which is a genuine zero-capacity corridor.
