table: network_transmission_path_limits
required: false
unique:
  - [path_id, direction, timeslice]
description: >
  Transmission capacity limits for each path, by direction and optionally by
  demand condition (timeslice).

  A limit with a timeslice applies to that demand condition only; a limit with
  no timeslice is a fallback for the conditions no per-timeslice limit covers
  (see the timeslice column). A path may carry either or both. In the default
  IASR data, flow-path limits vary by demand condition while REZ-to-subregion
  connection limits are static, but that reflects the source tables rather than
  a schema rule.

  Source tables:
    - `flow_path_transfer_capability`
    - `initial_transmission_limits`

  If absent:
  No transmission capacity limits are enforced.
columns:
  path_id:
    type: string
    required: true
    allowed_values_from:
      - network_transmission_paths: path_id
    description: Transmission path identifier.
  direction:
    type: string
    required: true
    allowed_values: [forward, reverse]
    description: Power flow direction relative to geo_from and geo_to.
  timeslice:
    type: string
    required: false
    allowed_values_from:
      - timeslices: timeslice_id
    description: >
      Demand condition the limit applies to: the limit binds only at snapshots
      inside the timeslice's active windows.

      If absent (or empty):
      The limit is a fallback for this path_id and direction, applying at
      snapshots not covered by any non-NaN timeslice row for the same path_id
      and direction. A path_id and direction may carry both a no-timeslice row
      and per-timeslice rows; where a per-timeslice row covers a snapshot its
      limit takes precedence, and the no-timeslice limit fills the remainder.
  capacity:
    type: float
    required: false
    units: MW
    gte: 0.0
    description: >
      Transfer capability limit.

      If absent (or empty):
      The path is constraint-modelled with no explicit physical limit.
