table: network_transmission_path_limits
required: false
custom_validation:
  - name: no_duplicate_path_direction_timeslice
    description: >
      No two rows may have the same path_id, direction, and timeslice value.
      For NaN timeslice rows, at most one row is permitted per path_id and
      direction combination.
description: >
  Static transmission capacity limits for each path by direction and timeslice.

  Flow path limits vary by demand condition (timeslice); REZ-to-subregion
  connection limits are static.

  Source tables:
    - `flow_path_transfer_capability`
    - `initial_transmission_limits`

  If absent:
  No transmission capacity limits are enforced.
columns:
  path_id:
    type: string
    required: true
    allowed_values_from:
      - network_transmission_paths: path_id
    description: Transmission path identifier.
  direction:
    type: string
    required: true
    allowed_values: [forward, reverse]
    description: Power flow direction relative to geo_from and geo_to.
  timeslice:
    type: string
    required: false
    allowed_values_from:
      - timeslices: timeslice_id
    description: >
      Demand condition the limit applies to.

      If absent (or empty):
      Capacity is treated as a static limit applying to all conditions.
  capacity:
    type: float
    required: false
    units: MW
    gte: 0.0
    description: >
      Transfer capability limit.

      If absent (or empty):
      The path is constraint-modelled with no explicit physical limit.
